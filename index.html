    <script>
        // Mobile Menu (unchanged)
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

        // ==================== DEXSCREENER STATS (unchanged) ====================
        async function fetchLiveStats() {
            const container = document.getElementById('stats-container');
            try {
                const res = await fetch('https://api.dexscreener.com/latest/dex/tokens/CvmRz15WYyhLRskuUFfRe6EybPjQdUqFA8URVcmSpump');
                const data = await res.json();
                const p = data.pairs?.[0] || {};
               
                const price = parseFloat(p.priceUsd || 0).toFixed(8);
                const mcap = p.fdv ? Math.round(p.fdv).toLocaleString() : '—';
                const volume = p.volume?.h24 ? Math.round(p.volume.h24).toLocaleString() : '—';

                container.innerHTML = `
                    <div class="hover-card bg-white border border-gray-200 rounded-3xl p-8 text-center">
                        <div class="text-5xl mb-4 text-[#22c55e]"><i class="fa-solid fa-dollar-sign"></i></div>
                        <div class="text-3xl font-bold">$${price}</div>
                        <div class="text-gray-900">Current Price</div>
                    </div>
                    <div class="hover-card bg-white border border-gray-200 rounded-3xl p-8 text-center">
                        <div class="text-5xl mb-4 text-[#22c55e]"><i class="fa-solid fa-chart-pie"></i></div>
                        <div class="text-3xl font-bold">$${mcap}</div>
                        <div class="text-gray-900">Market Cap</div>
                    </div>
                    <div class="hover-card bg-white border border-gray-200 rounded-3xl p-8 text-center">
                        <div class="text-5xl mb-4 text-[#22c55e]"><i class="fa-solid fa-arrow-trend-up"></i></div>
                        <div class="text-3xl font-bold">$${volume}</div>
                        <div class="text-gray-900">24h Volume</div>
                    </div>
                    <!-- NEW: Live Referrals Card -->
                    <div class="hover-card bg-white border border-gray-200 rounded-3xl p-8 text-center">
                        <div class="text-5xl mb-4 text-[#22c55e]"><i class="fa-solid fa-users"></i></div>
                        <div id="referral-count" class="text-3xl font-bold">—</div>
                        <div class="text-gray-900">Live Referrals</div>
                    </div>
                `;
            } catch (e) {
                console.error("DexScreener fetch failed");
            }
        }

        // ==================== NEW: HELIUS LIVE REFERRALS COUNT ====================
        let referralInterval = null;

        async function fetchReferralCount() {
            const countEl = document.getElementById('referral-count');
            if (!countEl) return;

            countEl.textContent = 'Counting...';

            const mint = "CvmRz15WYyhLRskuUFfRe6EybPjQdUqFA8URVcmSpump";
            const apiKey = "77ba4c04-45b3-46df-b1ec-59890f7f1ff2";
            const url = `https://mainnet.helius-rpc.com/?api-key=${apiKey}`;

            let page = 1;
            let totalReferrals = 0;
            const limit = 1000;

            try {
                while (true) {
                    const res = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            jsonrpc: "2.0",
                            id: 1,
                            method: "getTokenAccounts",
                            params: {
                                mint: mint,
                                limit: limit,
                                page: page
                            }
                        })
                    });

                    const data = await res.json();
                    const accounts = data.result?.tokenAccounts || data.result?.value || [];

                    if (accounts.length === 0) break;

                    // Count only non-zero balances
                    for (const acc of accounts) {
                        const amount = acc.amount || acc.uiAmountString || "0";
                        if (amount !== "0" && parseFloat(amount) > 0) {
                            totalReferrals++;
                        }
                    }

                    if (accounts.length < limit) break; // last page
                    page++;
                }

                countEl.textContent = totalReferrals.toLocaleString();
            } catch (e) {
                console.error("Helius RPC error:", e);
                countEl.textContent = "—";
            }
        }

        // Start everything
        window.onload = () => {
            fetchLiveStats();           // DexScreener stats
            fetchReferralCount();       // Helius referrals

            // Auto-refresh both every 45 seconds
            setInterval(() => {
                fetchLiveStats();
                fetchReferralCount();
            }, 45000);
        };
    </script>
